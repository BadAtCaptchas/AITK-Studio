---
job: extension
config:
  name: "my_asymflux2_klein_full_finetune_v1"
  process:
    - type: "sd_trainer"
      training_folder: "output"
      device: cuda:0
      save:
        dtype: bf16
        save_every: 250
        max_step_saves_to_keep: 2
        save_format: "diffusers"
      datasets:
        - folder_path: "/path/to/images/folder"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          resolution: [512, 768, 1024]
      train:
        batch_size: 1
        steps: 2000
        gradient_accumulation: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        timestep_type: "shift"
        optimizer: "adafactor"
        lr: 3e-5
        dtype: bf16
      model:
        arch: "asymflux2_klein_9b"
        name_or_path: "Lakonik/AsymFLUX.2-klein-9B"
        quantize_te: true
        model_kwargs:
          base_model_name_or_path: "black-forest-labs/FLUX.2-klein-base-9B"
          oklab_mean: [0.56, 0.0, 0.01]
          oklab_std: 0.16
          asymflow_shift: 17.0
          asymflow_max_shift: 34.0
          asymflow_base_scheduler: "UniPCMultistep"
        # To resume from a saved full finetune, set name_or_path to the saved
        # folder that contains transformer/ and aitk_meta.yaml.
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - "a cinematic portrait of [trigger], realistic lighting, shallow depth of field"
          - "[trigger] standing in a modern gallery, natural colors, detailed environment"
        neg: ""
        seed: 42
        walk_seed: true
        guidance_scale: 4
        sample_steps: 25
meta:
  name: "[name]"
  version: "1.0"

