---
job: extension
config:
  name: "my_first_glm_image_lora_auto_v1"
  process:
    - type: 'sd_trainer'
      training_folder: "output"
      device: cuda:0
      network:
        type: "lora"
        linear: 32
        linear_alpha: 32
        transformer_only: true
      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 4
      datasets:
        - folder_path: "/path/to/images/folder"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [512, 768, 1024]
      train:
        batch_size: 1
        gradient_accumulation: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        cache_text_embeddings: true
        auto_train: true
        save_on_phase_change: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 5e-5
        timestep_type: "weighted"
        content_or_style: "content"
        loss_type: "mse"
        optimizer_params:
          weight_decay: 0.0001
        dtype: bf16
        phases:
          - name: "Teach subject"
            optimizer: "adamw8bit"
            lr: 5e-5
            timestep_type: "weighted"
            content_or_style: "content"
            loss_type: "mse"
            optimizer_params:
              weight_decay: 0.0001
            auto_advance:
              type: "loss_plateau"
              metric: "loss/loss"
              mode: "min"
              min_steps: 300
              window: 100
              patience: 2
              min_delta_pct: 1.0
          - name: "Stabilize"
            optimizer: "adamw8bit"
            lr: 3e-5
            timestep_type: "weighted"
            content_or_style: "balanced"
            loss_type: "mse"
            optimizer_params:
              weight_decay: 0.0001
            auto_advance:
              type: "loss_plateau"
              metric: "loss/loss"
              mode: "min"
              min_steps: 300
              window: 100
              patience: 2
              min_delta_pct: 1.0
          - name: "Polish style"
            optimizer: "adamw8bit"
            lr: 1.5e-5
            timestep_type: "weighted"
            content_or_style: "style"
            loss_type: "mse"
            optimizer_params:
              weight_decay: 0.0001
            auto_advance:
              type: "loss_plateau"
              metric: "loss/loss"
              mode: "min"
              min_steps: 300
              window: 100
              patience: 2
              min_delta_pct: 1.0
      model:
        name_or_path: "zai-org/GLM-Image"
        arch: "glm_image"
        quantize: true
        qtype: "qfloat8"
        quantize_te: true
        qtype_te: "qfloat8"
        low_vram: true
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - "woman with red hair, playing chess at the park, bomb going off in the background"
          - "a woman holding a coffee cup, in a beanie, sitting at a cafe"
          - "a horse is a DJ at a night club, fish eye lens, smoke machine, laser lights, holding a martini"
        neg: ""
        seed: 42
        walk_seed: true
        guidance_scale: 1.5
        sample_steps: 50
meta:
  name: "[name]"
  version: '1.0'
