---
job: extension
config:
  name: "my_ideogram4_nvfp4_lora_v1"
  process:
    - type: "sd_trainer"
      training_folder: "output"
      device: cuda:0
      network:
        type: "lora"
        linear: 32
        linear_alpha: 32
        transformer_only: true
      save:
        dtype: bf16
        save_every: 250
        max_step_saves_to_keep: 4
      datasets:
        - folder_path: "/path/to/images/folder"
          # Captions should be JSON objects serialized as strings. No magic-prompt
          # or moderation API is used by training.
          caption_ext: "txt"
          caption_dropout_rate: 0.0
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [512, 768, 1024]
      train:
        batch_size: 1
        steps: 3000
        gradient_accumulation: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        cache_text_embeddings: true
        noise_scheduler: "flowmatch"
        timestep_type: "weighted"
        optimizer: "adamw8bit"
        lr: 4e-5
        dtype: bf16
      model:
        arch: "ideogram4"
        name_or_path: "Comfy-Org/Ideogram-4"
        # Comfy's repo only has weights. Use the official Ideogram repo, or a
        # local equivalent, for tokenizer and Qwen3-VL config files.
        extras_name_or_path: "ideogram-ai/ideogram-4-fp8"
        dtype: "bf16"
        train_text_encoder: false
        low_vram: true
        model_kwargs:
          quantization: "nvfp4"
          require_json_captions: false
          caption_strict: false
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - '{"high_level_description":"A clean product-style portrait of [trigger] on a modern set.","style_description":{"aesthetics":"polished, crisp, commercial","lighting":"large softbox lighting","photo":"50mm lens, sharp focus","medium":"photograph"},"compositional_deconstruction":{"background":"A minimal studio with subtle shadows.","elements":[{"type":"obj","bbox":[150,240,920,780],"desc":"[trigger] centered in the composition with accurate proportions and fine surface detail."}]}}'
        neg: ""
        seed: 42
        walk_seed: true
        guidance_scale: 7
        sample_steps: 20
meta:
  name: "[name]"
  version: "1.0"
