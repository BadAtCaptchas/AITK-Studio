version: "3.8"

services:
  ai-toolkit:
    image: ostris/aitoolkit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8675:8675"
      - "127.0.0.1:${AITK_TENSORBOARD_PORT:-6006}:${AITK_TENSORBOARD_PORT:-6006}"
    volumes:
      - ~/.cache/huggingface/hub:/root/.cache/huggingface/hub
      - ./aitk_db.db:/app/ai-toolkit/aitk_db.db
      - ./datasets:/app/ai-toolkit/datasets
      - ./output:/app/ai-toolkit/output
      - ./config:/app/ai-toolkit/config
    environment:
      - AI_TOOLKIT_AUTH=${AI_TOOLKIT_AUTH:?Set AI_TOOLKIT_AUTH to a strong bearer token before starting}
      - AITK_DB_PROVIDER=${AITK_DB_PROVIDER:-sqlite}
      - AITK_SQLITE_PATH=${AITK_SQLITE_PATH:-/app/ai-toolkit/aitk_db.db}
      - AITK_MONGODB_URI=${AITK_MONGODB_URI:-}
      - AITK_MONGODB_DB=${AITK_MONGODB_DB:-ai_toolkit}
      - AITK_DURABLE_DATASET_KEY_SECRET=${AITK_DURABLE_DATASET_KEY_SECRET:-}
      - AITK_ENABLE_TENSORBOARD=${AITK_ENABLE_TENSORBOARD:-}
      - AITK_TENSORBOARD_PORT=${AITK_TENSORBOARD_PORT:-6006}
      - AITK_TENSORBOARD_HOST=${AITK_TENSORBOARD_HOST:-0.0.0.0}
      - AITK_TENSORBOARD_LOG_DIR=${AITK_TENSORBOARD_LOG_DIR:-}
      - AITK_TENSORBOARD_PUBLIC_URL=${AITK_TENSORBOARD_PUBLIC_URL:-}
      - AITK_TENSORBOARD_STATUS_RUN=${AITK_TENSORBOARD_STATUS_RUN:-}
      - AITK_CLOUDFLARED_ENABLED=${AITK_CLOUDFLARED_ENABLED:-}
      - AITK_CLOUDFLARED_PUBLIC_URL=${AITK_CLOUDFLARED_PUBLIC_URL:-}
      - AITK_CLOUDFLARED_TOKEN_FILE=${AITK_CLOUDFLARED_TOKEN_FILE:-}
      - AITK_CLOUDFLARED_BIN=${AITK_CLOUDFLARED_BIN:-cloudflared}
      - AITK_CLOUDFLARED_METRICS_ADDR=${AITK_CLOUDFLARED_METRICS_ADDR:-127.0.0.1:60123}
      - AITK_CLOUDFLARED_LOG_LEVEL=${AITK_CLOUDFLARED_LOG_LEVEL:-info}
      - NODE_ENV=production
      - TZ=UTC
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
